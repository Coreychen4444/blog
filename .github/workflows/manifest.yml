name: Build posts manifest

on:
  push:
    branches: [main]
    paths:
      - "posts/**"
      - "scripts/build-manifest.mjs"
      - ".github/workflows/manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build manifest
        run: node scripts/build-manifest.mjs

      - name: Commit updated posts.json
        run: |
          if [ -n "$(git status --porcelain posts.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posts.json
            git commit -m "chore: regenerate posts.json [skip ci]"
            git push
          else
            echo "posts.json unchanged"
          fi
